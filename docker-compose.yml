services:
  postgres:
    image: postgres:16-alpine
    container_name: cacao-postgres
    environment:
      POSTGRES_DB: cacao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cacao"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cacao-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cacao-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cacao
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/cacao
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecretkey
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
    command: >
      sh -c "alembic upgrade head &&
      python seed.py &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cacao-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cacao
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/cacao
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecretkey
    command: celery -A app.celery_app worker --loglevel=info --pool=solo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cacao-celery-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cacao
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/cacao
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecretkey
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: cacao-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
